backend:
  name: github
  repo: ozlukasko-arch/web-lukasko
  branch: main

media_folder: "img" # Kam sa majú ukladať nahrané obrázky
public_folder: "/img"

collections:
  - name: "pages"
    label: "Stránky"
    files:
      - file: "index.html"
        label: "Domovská stránka"
        name: "index"
        fields:
          - {label: "Hlavný nadpis", name: "title", widget: "string"}
          - {label: "Text o nás", name: "about_text", widget: "markdown"}
